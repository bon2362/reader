name: Reader
# Planned repository direction:
# - keep macOS app, iPhone app, and sync layer in this same repository
# - evolve toward a monorepo with separate app targets plus shared/sync layers
# - do not split iPhone MVP or CloudKit sync into a separate repository at this stage
options:
  bundleIdPrefix: com.koshkin
  deploymentTarget:
    macOS: "14.0"
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift.git
    exactVersion: "7.10.0"
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation.git
    from: "0.9.19"

targets:
  Reader:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Reader
        excludes:
          - "**/*.md"
    resources:
      - path: Reader/Resources/Assets.xcassets
      - path: Reader/Resources/JS
        buildPhase: resources
    dependencies:
      - package: GRDB
      - package: ZIPFoundation
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.koshkin.reader
        PRODUCT_NAME: "slow reader"
        PRODUCT_MODULE_NAME: Reader
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: "slow reader"
        INFOPLIST_KEY_CFBundleName: "slow reader"
    scheme:
      testTargets:
        - ReaderTests

  ReaderiPhone:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Reader/Database
      - path: Reader/Features/Library/LibraryRepository.swift
      - path: Reader/Features/Library/BookImporter.swift
      - path: Reader/Features/Annotations/AnnotationRepository.swift
      - path: Reader/Features/Annotations/HighlightsStore.swift
      - path: Reader/Features/PDFReader/PDFBookLoader.swift
      - path: Reader/Features/PDFReader/PDFAnchor.swift
      - path: Reader/Features/PDFReader/PDFSelectionAnchorResolver.swift
      - path: Reader/Features/PDFReader/PDFHighlightRenderer.swift
      - path: Reader/Features/PDFReader/PDFReadingProgress.swift
      - path: Reader/Features/PDFReader/PDFMarkupGeometry.swift
      - path: Reader/Shared
      - path: ReaderiPhone
        excludes:
          - "**/*.md"
    resources:
      - path: Reader/Resources/Assets.xcassets
    dependencies:
      - package: GRDB
      - package: ZIPFoundation
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.koshkin.readeriphone
        PRODUCT_NAME: "slow reader iPhone"
        PRODUCT_MODULE_NAME: ReaderiPhone
        SWIFT_VERSION: "6.0"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: "slow reader iPhone"
        INFOPLIST_KEY_CFBundleName: "slow reader iPhone"
        TARGETED_DEVICE_FAMILY: "1"

  ReaderTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: ReaderTests
    dependencies:
      - target: Reader
      - package: GRDB
      - package: ZIPFoundation
    settings:
      base:
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_MODULE_NAME: ReaderTests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/slow reader.app/Contents/MacOS/slow reader"
        BUNDLE_LOADER: "$(TEST_HOST)"
